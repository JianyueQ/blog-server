# 项目相关配置
blog:
  # 名称
  name: Blog
  # 版本
  version: 0.0.1
  # 版权年份
  copyrightYear: 2026
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8998
  port: 8998
  servlet:
    # 应用的访问路径
    context-path: /

  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100
    # Tomcat上传配置
    max-http-form-post-size: 100MB
    max-swallow-size: 100MB


# 日志配置
logging:
  level:
    com.blog: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: dev-remote
    # 文件上传
  servlet:
    multipart:
      # 单个文件大小 - 调整为50MB以支持高清晰度图片
      max-file-size: 50MB
      # 设置总上传的文件大小 - 调整为100MB
      max-request-size: 100MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: false
  # redis 配置
  data:
    redis:
      # 地址
      host: ${blog.redis.host}
      # 端口，默认为6379
      port: ${blog.redis.port}
      # 数据库索引
      database: ${blog.redis.database}
      # 密码
      password: ${blog.redis.password}
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${blog.datasource.host}:${blog.datasource.port}/${blog.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${blog.datasource.username}
    password: ${blog.datasource.password}
  rabbitmq:
    host: ${blog.rabbitmq.host}
    port: ${blog.rabbitmq.port}
    username: ${blog.rabbitmq.username}
    password: ${blog.rabbitmq.password}
    virtual-host: /blog
    # 连接池配置
    connection-timeout: 15000
    # 开启发布确认
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    # 重试机制开启,重试次数3次
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2


minio:
  endpoint: ${blog.minio.endpoint}  # MinIO服务端地址
  bucketName: ${blog.minio.bucketName}  # 存储空间名称
  accessKey: ${blog.minio.accessKey}  # 访问密钥
  secretKey: ${blog.minio.secretKey}  # 秘密密钥

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.blog.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1,jianyue.cloud,blog.jianyue.cloud

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice,/system/articles/*,/system/config/aboutMe/*
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/blog/*
