# 根据CPU核心数自动设置worker进程数
worker_processes  auto;

# 优化事件处理模型
events {
    worker_connections  2048;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 开启高效文件传输模式
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # 连接超时优化
    keepalive_timeout  65;
    keepalive_requests 100;

    # 启用gzip压缩
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/x-font-ttf
        application/x-font-opentype
        application/vnd.ms-fontobject
        image/svg+xml
        image/x-icon
        font/ttf
        font/eot
        font/otf
        font/woff
        font/woff2;
    gzip_disable "msie6";

    # 日志格式优化
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    # 隐藏版本号
    server_tokens off;

    # 客户端请求体大小限制
    client_max_body_size 20m;
    client_body_buffer_size 128k;

    # 文件上传优化
    client_header_buffer_size 4k;
    large_client_header_buffers 4 32k;

    # WebSocket升级映射
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # 后端服务器负载均衡
    upstream blog-server {
        server blog-server:8998;
        keepalive 32;
    }

    # ============================================
    # HTTPS服务器配置
    # ============================================
    server {
        listen       18001 ssl http2 proxy_protocol;
        server_name  blog.jianyue.cloud;

        # SSL证书配置
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # 获取真实客户端IP（信任Docker网络和FRP客户端）
        #set_real_ip_from  172.21.0.0/16;  # 信任Docker网络
        #set_real_ip_from  192.168.31.68;  # 信任FRP客户端IP
        #real_ip_header    proxy_protocol;
        #real_ip_recursive on;


        # 从 PROXY Protocol 获取真实客户端IP
        set_real_ip_from  127.0.0.1;
        set_real_ip_from  192.168.31.0/24;
        real_ip_header    proxy_protocol;

        # SSL优化配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 静态资源根路径
        location / {
            root   /usr/share/nginx/html/blog;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;

            # 静态资源缓存配置
            # HTML文件不缓存（或短缓存）
            location ~* \.html?$ {
                expires 5m;
                add_header Cache-Control "public, must-revalidate";
            }

            # CSS和JS文件缓存
            location ~* \.(css|js)$ {
                expires 7d;
                add_header Cache-Control "public, immutable";
            }

            # 图片文件缓存
            location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|bmp)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }

            # 字体文件缓存
            location ~* \.(woff|woff2|ttf|eot|otf)$ {
                expires 365d;
                add_header Cache-Control "public, immutable";
            }

            # 媒体文件缓存
            location ~* \.(mp4|mp3|webm|ogg|avi|flv)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # 后端API接口代理
        location /api/ {
            proxy_pass http://blog-server/;
            proxy_http_version 1.1;

            # 请求头设置
            proxy_set_header Host $host;
            # proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Real-IP $proxy_protocol_addr;
            #proxy_set_header X-Forwarded-For $proxy_ad  d_x_forwarded_for;
            proxy_set_header X-Forwarded-For $proxy_protocol_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # SSE支持
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # 超时设置
            proxy_connect_timeout 60s;
        }

        # WebSocket配置
        location /ws/ {
            proxy_pass http://blog-server;
            proxy_http_version 1.1;

            # WebSocket必需头
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            #proxy_set_header X-Real-IP $remote_addr;
            #proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $proxy_protocol_addr;
            proxy_set_header X-Forwarded-For $proxy_protocol_addr;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }

    # HTTP重定向到HTTPS
    server {
        listen 18001 proxy_protocol;
        server_name  blog.jianyue.cloud;


        # 从 PROXY Protocol 获取真实IP
        set_real_ip_from  127.0.0.1;
        set_real_ip_from  192.168.31.0/24;
        real_ip_header    proxy_protocol;

        return 301 https://$server_name$request_uri;
    }
}
