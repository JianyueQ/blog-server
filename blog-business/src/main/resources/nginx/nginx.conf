worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;

    keepalive_timeout  65;

	map $http_upgrade $connection_upgrade{
		default upgrade;
		'' close;
	}

	upstream blog-server {
	  server blog-server:8998;
	}

    server {
        listen       18001 ssl;
        # 域名
        server_name  blog.jianyue.cloud;

        ssl_certificate /etc/nginx/ssl/blog.jianyue.cloud.pem;
        ssl_certificate_key /etc/nginx/ssl/blog.jianyue.cloud.key;

        location / {
            root   /usr/share/nginx/html/blog;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # 后端接口
        location /api/ {
            proxy_pass http://blog-server/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 添加 SSE 支持
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }

        # WebSocket 配置
        location /websocket/ {
            proxy_pass http://blog-server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }
    }

    server {
        listen 18001 ssl;
        server_name  blog.jianyue.cloud;
        return 301 https://$server_name$request_uri;
    }
}
